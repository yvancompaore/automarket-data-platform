version: "3.8"

# ============================================================
# AutoMarket Data Platform — Stack locale (sans AWS)
# MongoDB + Airflow + Dashboard Streamlit
# Stockage : fichiers Parquet locaux (bronze / silver / gold)
# ============================================================

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.1-python3.11
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: "81HqDtbqAywKSOumSha3BhWNOdQ26slT6K0YaZeZyPs="
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    # MongoDB
    MONGO_URI: mongodb://admin:admin@mongodb:27017
    MONGO_DB: automarket_raw
    # Chemins locaux (montés en volume)
    DATA_DIR: /opt/airflow/data
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./ingestion:/opt/airflow/ingestion
    - ./scripts:/opt/airflow/scripts
    - ./data:/opt/airflow/data          # Bronze / Silver / Gold partagés
    - airflow-logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy
    mongodb:
      condition: service_healthy

services:
  # ─── PostgreSQL (backend Airflow) ────────────────────────
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5

  # ─── MongoDB (Raw Landing Zone) ──────────────────────────
  mongodb:
    image: mongo:7.0
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin
      MONGO_INITDB_DATABASE: automarket_raw
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      retries: 5

  # ─── Mongo Express (UI MongoDB) ──────────────────────────
  mongo-express:
    image: mongo-express:1.0.2
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: admin
      ME_CONFIG_MONGODB_URL: mongodb://admin:admin@mongodb:27017/
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      mongodb:
        condition: service_healthy

  # ─── Airflow Init ─────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        pip install pymongo requests duckdb pandas pyarrow --quiet
        airflow db init
        airflow users create --username admin --password admin \
          --firstname Admin --lastname User --role Admin \
          --email admin@automarket.com
    restart: on-failure

  # ─── Airflow Webserver ────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8082:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      retries: 5
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ─── Airflow Scheduler ────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ─── Streamlit Dashboard ─────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile.local
    ports:
      - "8501:8501"
    environment:
      MONGO_URI: mongodb://admin:admin@mongodb:27017
      DATA_DIR: /app/data
    volumes:
      - ./data:/app/data
    depends_on:
      - mongodb

volumes:
  postgres-db:
  mongo-data:
  airflow-logs:
